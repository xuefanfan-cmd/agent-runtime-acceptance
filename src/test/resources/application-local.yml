# Local development environment configuration
# Suitable for running tests against a local SUT instance.
# Select with: ./mvnw -Dtest.env=LOCAL ... (the default when test.env / TEST_ENV is unset).

# Managed SUT agents — Maven coordinates resolved from the local repository (~/.m2).
# Override repo root when Maven localRepository is not ~/.m2/repository, e.g.:
#   sut.m2.repo: D:/repository
# The framework launches these as black-box java -jar processes. third_party jars
# are for code analysis only and are never used at runtime.
#
# Backing services (Testcontainers): declare image/port under sut.services.<name>.
# Agents reference a service via sut.agents.<name>.service-bindings.<svc> (url-key + url-template only).
# Use official Docker Hub image names here (e.g. redis:7-alpine). For mirror/accelerator
# settings use ~/.testcontainers.properties locally — not in this repo.

sut:
  timeout:
    poll-seconds: 120
    poll-interval-ms: 500
    connect-timeout-seconds: 5
    read-timeout-seconds: 30
    startup-seconds: 60
  services:
    redis:
      image: redis:7-alpine
      port: 6379
  agents:
    mainplan:
      group: com.huawei.ascend.examples
      artifact: agent-travel-mainplan-a2a
      version: 0.2.0-SNAPSHOT
    # Same jar as mainplan; service-bindings start sut.services.redis and inject redis-url.
    # Used by B-03 and B-04 Phase2 (redis checkpointer). B-04 Phase1 uses plain mainplan.
    mainplan-redis:
      group: com.huawei.ascend.examples
      artifact: agent-travel-mainplan-a2a
      version: 0.2.0-SNAPSHOT
      service-bindings:
        redis:
          url-key: main-plan-agent.redis-url
          url-template: "redis://{{url}}"
    trip:
      group: com.huawei.ascend.examples
      artifact: agent-trip-a2a
      version: 0.2.0-SNAPSHOT
    hotel:
      group: com.huawei.ascend.examples
      artifact: agent-hotel-a2a
      version: 0.2.0-SNAPSHOT
    # —— Expense Review（单 jar 双 profile；main profile 经 remote-agents[0] 调 workflow）——
    expense-review-workflow:
      group: com.huawei.ascend.examples
      artifact: agent-workflow-expense-review
      version: 0.2.0-SNAPSHOT
    expense-review-main:
      group: com.huawei.ascend.examples
      artifact: agent-workflow-expense-review
      version: 0.2.0-SNAPSHOT
      profile: main
  # JVM -D system properties injected into EVERY launched agent (rendered before -jar).
  # Java/JVM convention: proxy + no-proxy go here as standard JVM props; Spring also resolves
  # the agents' ${LLM_*} from these, so LLM may be supplied via -D here too.
  # Uncomment and fill for your environment. Secrets (e.g. LLM_API_KEY) prefer the LLM_* env
  # path (agents read ${LLM_*} natively) rather than this tracked file.
#  java:
#    system-properties:
#      # —— HTTP proxy + no-proxy (standard JVM proxy properties) ——
#      http.proxyHost:
#      http.proxyPort:
#      https.proxyHost:
#      https.proxyPort:
#      http.nonProxyHosts:
#      # —— LLM (optional; overrides/aligns the agents' ${LLM_*}) ——
#      LLM_PROVIDER:
#      LLM_API_BASE:
#      LLM_MODEL:
#      LLM_API_KEY:
#      LLM_SSL_VERIFY:
