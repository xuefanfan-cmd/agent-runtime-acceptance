# Openjiuwen travel-chain environment configuration.
# Managed SUT agents launched from ~/.m2 — the openjiuwen variant of the travel chain
# (mainplan → trip → hotel, artifacts agent-openjiuwen-travel-*). Same structure as
# application-local.yml; select it with: ./mvnw -Dtest.env=openjiuwen ...

sut:
  timeout:
    poll-seconds: 120
    poll-interval-ms: 500
    connect-timeout-seconds: 5
    read-timeout-seconds: 30
    startup-seconds: 60
  wire-log:
    enabled: true
  services:
    redis:
      image: redis:7-alpine
      port: 6379
    envexplorer:
      image: agent-env/env-explorer:20260705
      port: 3001
    jiuwenbox:
      image: jiuwenbox:latest
      port: 8321
      # Remote mode must use host:port without a scheme, e.g. 127.0.0.1:8321.
      # url: "127.0.0.1:8321"
      env:
        JIUWENBOX_POLICY_PATH: /app/configs/wsl-dev-policy.yaml
      # Read only by OJ-09/OJ-10's inline container factory.
      test-container:
        privileged: true
        host-port: 8321
        source-policy: /app/configs/default-policy.yaml
        working-policy: /app/configs/wsl-dev-policy.yaml
        runtime-policy: /usr/local/lib/python3.11/configs/default-policy.yaml
        policy-dir: /root/.jiuwenbox/policies
        state-dir: /root/.jiuwenbox/state
        restart-after-bootstrap: true
  # Managed SUT agents — Maven coordinates resolved from the local repository (~/.m2).
  # The framework launches these as black-box java -jar processes. third_party jars
  # are for code analysis only and are never used at runtime.
  # Per-agent JVM -D / Spring -- override hints are documented in application-local.yml.
  agents:
    mock-mcp:
      group: com.huawei.ascend.examples
      artifact: travel-openjiuwen-test-support
      version: 0.1.0
      ready-mode: tcp

    # react scenario
    mainplan:
      group: com.openjiuwen.example
      artifact: travel-demo-mainplan
      version: 0.1.0
      port: 8095
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      spring:
        properties:
          openjiuwen.service.a2a.remote-agents[0].name: "travel-trip"
    mainplan-redis:
      group: com.openjiuwen.example
      artifact: travel-demo-mainplan
      version: 0.1.0
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      spring:
        properties:
          openjiuwen.service.a2a.remote-agents[0].name: "travel-trip"
      service-bindings:
        redis:
          url-key: main-plan-agent.redis-url
          url-template: "redis://{{url}}"
    trip:
      group: com.openjiuwen.example
      artifact: travel-demo-trip
      version: 0.1.0
      port: 8094
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      spring:
        properties:
          # MUST match RemoteHotelRail agentName / jar default.
          openjiuwen.service.a2a.remote-agents[0].name: "travel-hotel"
    hotel:
      group: com.openjiuwen.example
      artifact: travel-demo-hotel
      version: 0.1.0
      port: 8093
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
    hotel-sandbox:
      group: com.openjiuwen.example
      artifact: travel-demo-hotel
      version: 0.1.0
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      service-bindings:
        jiuwenbox:
          url-key: openjiuwen.service.external.sandbox.servers[0].service-url
          url-template: "http://{{url}}"
    # deepresearch secnario
    # workflow scenario
    expense-review-workflow:
      group: com.openjiuwen.example
      artifact: versatile-orch-demo-expense-review
      version: 0.2.0-SNAPSHOT
    expense-review-main:
      group: com.openjiuwen.example
      artifact: versatile-orch-demo-expense-review-main
      version: 0.2.0-SNAPSHOT
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      spring:
        properties:
          openjiuwen.service.a2a.remote-agents[0].name: "expense-review"
    edpa-gateway:
      group: com.openjiuwen.example
      artifact: versatile-orch-demo-gateway
      version: 0.2.0-SNAPSHOT
      # 非 A2A 服务：不提供 /.well-known/agent.json，按 TCP LISTEN 端口判就绪（而非探 agent card）。
      ready-mode: tcp
    edpa-plan-agent:
      group: com.openjiuwen.example
      artifact: versatile-orch-demo-plan-agent
      version: 0.2.0-SNAPSHOT
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      spring:
        properties:
          openjiuwen.service.a2a.remote-agents[0].name: "versatile-adapter"
    edpa-adapter:
      group: com.openjiuwen.example
      artifact: versatile-orch-demo-adapter
      version: 0.2.0-SNAPSHOT
      service-bindings:
        envexplorer:
          url-key: openjiuwen.service.versatile.url-template
          url-template: "http://{{url}}/v1/mock_project_id/agents/fb723468-c8ca-424b-a95f-a3e74b37e090/conversations/{conversation_id}"
    # multi-workflow 变体：同 jar，激活 application-multi-workflow.yml（按 intent 路由到 workflow 端点）。
    # 两条 workflow URL 占位符（VERSATILE_BALANCE_WORKFLOW_URL / VERSATILE_TRANSFER_WORKFLOW_URL）由
    # MultiWorkflowDirectStreamingTest 编程式 serviceBinding 注入（同一 envexplorer，多绑定）。
    # 此处只保留 fallback 绑定（agents 格式，未匹配 intent 兜底），并让 envexplorer 被 YAML 收集。
    edpa-adapter-multi-workflow:
      group: com.openjiuwen.example
      artifact: versatile-orch-demo-adapter
      version: 0.2.0-SNAPSHOT
      profile: multi-workflow
      service-bindings:
        envexplorer:
          url-key: openjiuwen.service.versatile.url-template
          url-template: "http://{{url}}/v1/mock_project_id/agents/fb723468-c8ca-424b-a95f-a3e74b37e090/conversations/{conversation_id}"
  java:
    system-properties:
#      LLM_API_BASE:
#      LLM_MODEL:
#      LLM_API_KEY:
#      LLM_SSL_VERIFY:
#      # —— HTTP proxy + no-proxy (standard JVM proxy properties) ——
