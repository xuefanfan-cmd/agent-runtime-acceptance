# Openjiuwen travel-chain environment configuration.
# Managed SUT agents launched from ~/.m2 — the openjiuwen variant of the travel chain
# (mainplan → trip → hotel, artifacts agent-openjiuwen-travel-*). Same structure as
# application-local.yml; select it with: ./mvnw -Dtest.env=openjiuwen ...

sut:
  timeout:
    poll-seconds: 120
    poll-interval-ms: 500
    connect-timeout-seconds: 5
    read-timeout-seconds: 30
    startup-seconds: 60
  # Managed SUT agents — Maven coordinates resolved from the local repository (~/.m2).
  # The framework launches these as black-box java -jar processes. third_party jars
  # are for code analysis only and are never used at runtime.
  # Per-agent JVM -D / Spring -- override hints are documented in application-local.yml.
  agents:
    mainplan:
      group: com.huawei.ascend.examples
      artifact: agent-openjiuwen-travel-mainplan
      version: 0.1.0
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      spring:
        properties:
          openjiuwen.service.a2a.remote-agents[0].name: "agent-openjiuwen-travel-trip"
    trip:
      group: com.huawei.ascend.examples
      artifact: agent-openjiuwen-travel-trip
      version: 0.1.0
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
      spring:
        properties:
          openjiuwen.service.a2a.remote-agents[0].name: "agent-openjiuwen-travel-hotel"
    hotel:
      group: com.huawei.ascend.examples
      artifact: agent-openjiuwen-travel-hotel
      version: 0.1.0
      remote-agents-prefix: openjiuwen.service.a2a.remote-agents
  # JVM -D system properties injected into EVERY launched agent (rendered before -jar).
  # Java/JVM convention: proxy + no-proxy go here as standard JVM props; Spring also resolves
  # the agents' ${LLM_*} from these, so LLM may be supplied via -D here too.
  # Secrets (e.g. LLM_API_KEY) prefer the LLM_* env path (agents read ${LLM_*} natively).

