# JUnit Platform — parallel execution master switch.
#
# Parallel execution is *enabled* here but the node and class defaults stay
# `same_thread`, so the overall test suite is unchanged unless a class explicitly
# opts in with @Execution(ExecutionMode.CONCURRENT). StreamingTravelPlanningTest
# does so to run its cases concurrently against the shared managed stack.
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=same_thread
