# spring-ai-ascend feature coverage map
#
# Purpose:
#   This file is SUT-specific. It maps externally specified acceptance
#   features to the spring-ai-ascend modules expected to collaborate and to
#   acceptable observable evidence. It does not change the SUT-agnostic specs.
#
# Boundary:
#   Acceptable evidence must be externally visible or exposed through public
#   operator/diagnostic surfaces. Private class invocation, package paths,
#   database internals, and source-code structure are not acceptance objects.
#   Missing supporting evidence should normally be reported as an evidence_gap
#   in coverage analysis, not as a spec-level FAIL, unless the referenced AT
#   explicitly requires that observation surface.

sut_id: spring-ai-ascend
method: architecture-aware external integration acceptance
version: draft-0.1

modules:
  agent-client:
    role: external client contract and SDK/API invocation surface
  agent-service:
    role: run lifecycle, submission, polling, cancellation, persistence-facing orchestration
  agent-middleware:
    role: auth, tenant scope, policy enforcement, request shaping, trace propagation
  agent-bus:
    role: control/data/rhythm message transport and isolation boundary
  agent-execution-engine:
    role: run execution, engine-mode dispatch, state advancement, cancellation handling
  agent-evolve:
    role: feedback, evaluation artifact, strategy/candidate evolution flow
  spring-ai-ascend-graphmemory-starter:
    role: optional graph memory integration surface when enabled

features:
  async_task_boundary:
    acceptance_specs: [AT-001]
    expected_modules:
      - agent-client
      - agent-service
      - agent-middleware
      - agent-bus
      - agent-execution-engine
    expected_collaboration:
      - public request is accepted without waiting for worker completion
      - run lifecycle record becomes externally pollable
      - execution proceeds independently of client connection lifetime
      - cancellation path remains addressable after acknowledgement
    required_evidence:
      - create_long_task returns a task handle and poll address within the latency budget
      - acknowledgement response does not include terminal worker output
      - poll_task can observe a mapped abstract state for the returned handle
      - cancel_task against the returned handle is reachable
    optional_evidence:
      - trace correlation across create, poll, and cancel
      - public metric showing accepted runs or dispatched runs increased
      - audit event for run creation
    evidence_gap_handling: report_coverage_gap_not_spec_fail
    unacceptable_evidence:
      - private Java method invocation
      - concrete executor class name
      - database table row inspection

  multi_tenant_isolation:
    acceptance_specs: [AT-002]
    expected_modules:
      - agent-client
      - agent-service
      - agent-middleware
      - agent-bus
    expected_collaboration:
      - tenant identity is established before run creation
      - every read/cancel/list path is scoped to the caller tenant
      - cross-tenant object references do not leak or mutate foreign data
    required_evidence:
      - tenant B cannot poll tenant A's task handle
      - tenant B cannot cancel tenant A's task handle
      - tenant B list results exclude tenant A tasks
      - tenant claim/header mismatch is rejected when supported by auth shape
    optional_evidence:
      - audit event records denied cross-tenant access without leaking foreign payload
      - trace carries tenant correlation on create, poll, cancel
      - public security metric for denied authorization attempts increases
    evidence_gap_handling: report_coverage_gap_not_spec_fail
    unacceptable_evidence:
      - direct storage table query as the primary assertion
      - internal repository method invocation
      - package-level dependency assertions

  submission_schema_strict_matching:
    acceptance_specs: [AT-003]
    expected_modules:
      - agent-client
      - agent-service
      - agent-middleware
      - agent-execution-engine
    expected_collaboration:
      - boundary validation rejects unknown task/capability types
      - dispatcher does not silently route unknown work to a default handler
      - rejected submissions do not create phantom run records
    required_evidence:
      - known task type is accepted
      - unknown task type returns structured 4xx
      - rejection identifies offending field and value
      - list/poll does not reveal a phantom task from the rejected submission
    optional_evidence:
      - public metric for validation rejections increases
      - trace/span marks validation failure before dispatch
    evidence_gap_handling: report_coverage_gap_not_spec_fail
    unacceptable_evidence:
      - enum source-code inspection
      - dispatcher private branch coverage

  fail_closed_startup:
    acceptance_specs: [AT-004]
    expected_modules:
      - agent-service
      - agent-middleware
      - agent-bus
      - agent-execution-engine
    expected_collaboration:
      - production posture validates required configuration before serving traffic
      - unsafe dev-only implementations are rejected before HTTP port opens
      - failed boot does not leave partial serving processes behind
    required_evidence:
      - valid_prod boot profile exposes a healthy base URL
      - missing_required boot profile exits non-zero and no endpoint responds
      - inmem_in_prod boot profile exits non-zero when applicable
      - stderr names the missing key or rejected component through public boot output
    optional_evidence:
      - process supervisor report
      - structured startup diagnostics
    evidence_gap_handling: report_coverage_gap_not_spec_fail
    unacceptable_evidence:
      - reading SUT internal configuration source files as the assertion
      - bean graph private inspection

  control_plane_liveness_under_load:
    acceptance_specs: [AT-005]
    expected_modules:
      - agent-client
      - agent-service
      - agent-middleware
      - agent-bus
      - agent-execution-engine
    expected_collaboration:
      - data-plane saturation is induced through public create_long_task requests
      - health and cancellation remain responsive through control-plane paths
      - data-plane backpressure does not collapse the control plane
    required_evidence:
      - health p99 remains within budget during saturation
      - cancel p99 remains within budget during saturation
      - no control-plane 5xx during saturation
      - health recovers to baseline within bounded time after saturation stops
    optional_evidence:
      - public metric for control-plane latency
      - public metric for data-plane backpressure
      - trace correlation for cancel under load
    evidence_gap_handling: report_coverage_gap_not_spec_fail
    unacceptable_evidence:
      - thread-pool internals as the primary assertion
      - private bus channel implementation details

  idempotent_submission:
    acceptance_specs: [AT-006-proposed]
    expected_modules:
      - agent-client
      - agent-service
      - agent-middleware
      - agent-execution-engine
    expected_collaboration:
      - retries with the same idempotency key resolve to the same logical run
      - duplicate submissions do not produce duplicate side effects
    required_evidence:
      - same tenant and same idempotency key returns same handle or equivalent accepted response
      - task list does not contain duplicate runs for the same idempotency key
      - final result is produced once
    optional_evidence:
      - public idempotency hit metric increases
      - audit event marks replay/deduplication

  engine_mode_contract_consistency:
    acceptance_specs: [AT-009-proposed]
    expected_modules:
      - agent-service
      - agent-middleware
      - agent-bus
      - agent-execution-engine
    expected_collaboration:
      - externally selected engine modes honour the same run lifecycle contract
      - state vocabulary remains stable across engine implementations
    required_evidence:
      - GRAPH-mode run and AGENT_LOOP-mode run both create, poll, cancel, and terminate through the same abstract contract
      - unsupported engine mode is rejected with structured 4xx
      - no engine mode leaks internal executor details in public errors
    optional_evidence:
      - trace/span attribute identifies engine mode through public observability surface
      - per-engine public metrics exist

  suspend_resume_external_event_flow:
    acceptance_specs: [AT-010-proposed]
    expected_modules:
      - agent-service
      - agent-middleware
      - agent-bus
      - agent-execution-engine
    expected_collaboration:
      - waiting work becomes externally observable as suspended or equivalent non-terminal waiting state
      - external resume event advances the same run without creating a new run
      - timeout or expiry is externally distinguishable from failure
    required_evidence:
      - poll_task observes SUSPENDED or mapped waiting state when external event is pending
      - resume stimulus causes subsequent poll to observe RUNNING or terminal success/failure
      - run handle remains stable across suspend and resume
    optional_evidence:
      - rhythm/control-plane metric for resume delivery
      - audit event for suspend and resume

  evolve_feedback_loop:
    acceptance_specs: [AT-013-proposed]
    expected_modules:
      - agent-service
      - agent-middleware
      - agent-bus
      - agent-evolve
    expected_collaboration:
      - external feedback/evaluation is accepted through public surface
      - evolve produces a queryable artifact or candidate
      - candidate does not mutate online execution policy without explicit publication boundary
    required_evidence:
      - feedback submission returns accepted status
      - evaluation/candidate artifact is externally queryable
      - online run behavior remains stable until publication/activation is requested
    optional_evidence:
      - audit event for feedback ingestion
      - public metric for candidate generation
      - trace correlation from run to feedback artifact
