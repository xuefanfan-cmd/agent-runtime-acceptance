# Adapter binding for the spring-ai-ascend SUT.
#
# This file (and its sibling README.md) is the only place in
# agent-runtime-acceptance where the product name "spring-ai-ascend"
# appears in a load-bearing way. All test cases reference only abstract
# capability ids; this adapter binds those ids to the SUT's concrete
# surface.

sut_id: spring-ai-ascend

# Bumped on every PR that updates this adapter to track a newer revision
# of ../../../sut/sut-contract.md. Placeholder until the first commit
# lands and we can record the actual sha.
contract_version: "<placeholder — fill in at first commit>"

endpoints:
  health:
    method: GET
    url_template: "{base}/v1/health"
  create_long_task:
    method: POST
    url_template: "{base}/v1/runs"
  poll_task:
    method: GET
    url_template: "{base}/v1/runs/{handle}"
  cancel_task:
    method: POST
    url_template: "{base}/v1/runs/{handle}/cancel"
  list_tasks:
    method: GET
    url_template: "{base}/v1/runs"

hooks:
  set_worker_delay_ms:
    available: false
    reason: |
      The SUT has not yet exposed a runtime-mutable worker-delay hook on a
      public surface. A test-only HTTP endpoint is planned. Until then,
      AT-001.C and AT-001.E will report INCONCLUSIVE against this adapter.
  force_worker_failure:
    available: false
    reason: "Not yet exposed."
  seed_tenant:
    available: false
    reason: |
      The SUT does not currently expose a tenant-provisioning API. AT-002
      will report INCONCLUSIVE against this adapter for all sub-clauses
      until a seeding mechanism is added (e.g. a test-only POST /tenants
      or a CLI invocation inside boot.sh that mints two JWTs).
  revoke_credentials:
    available: false
    reason: "Not yet exposed."
  verify_storage_layer_scope:
    available: false
    reason: |
      Black-box verification of Postgres RLS enforcement is not yet
      exposed. AT-002.E will report INCONCLUSIVE until a hook is added
      (e.g. a test-only endpoint that runs a known cross-tenant query
      with session GUC and returns the row count visible).

response_shape:
  create_long_task:
    task_handle_jsonpath: "$.runId"
    poll_address_jsonpath: "$.pollUrl"
    terminal_output_jsonpaths_forbidden:
      - "$.result"
      - "$.output"
      - "$.terminal_output"
  poll_task:
    state_jsonpath: "$.status"
    created_at_jsonpath: "$.createdAt"
    finished_at_jsonpath: "$.finishedAt"

state_mapping:
  RUNNING:   [PENDING, RUNNING]
  SUCCEEDED: [SUCCEEDED]
  FAILED:    [FAILED]
  CANCELLED: [CANCELLED]
  EXPIRED:   [EXPIRED]
  SUSPENDED: [SUSPENDED]

# Disconnect-triggered erasure means: if the client TCP connection drops
# during work, the SUT erases the task. This SUT does NOT do that.
disconnect_triggered_erasure: false

# AT-003 — submission validation exemplars.
# spring-ai-ascend does not yet expose a registered task-type taxonomy on
# its public surface (capability registry is a W2+ design contract). Until
# it does, AT-003 reports INCONCLUSIVE for all sub-clauses against this
# adapter. Placeholders are listed here as a forward marker; the
# adapter validator will flag these as unresolved.
submission_validation:
  known_task_type: null              # PLACEHOLDER until SUT ships capability surface
  unknown_task_type: null            # PLACEHOLDER
  submission_type_jsonpath: "$.capability"
  rejection_field_jsonpath: null     # PLACEHOLDER
  rejection_value_jsonpath: null     # PLACEHOLDER

# AT-004 — boot profiles.
# Only `valid_prod` is currently supported; missing_required and
# inmem_in_prod require boot.sh to recognise the --profile flag, which
# is planned but not shipped.
boot_profiles:
  valid_prod:
    available: false
    reason: "boot.sh / teardown.sh not yet shipped; placeholder for first iteration."
  missing_required:
    available: false
    reason: "Not yet supported by boot.sh."
  inmem_in_prod:
    available: false
    reason: "Not yet supported by boot.sh."
missing_config_key: null             # for AT-004.C
dev_only_component_name: null        # for AT-004.D

# AT-005 — capacity declarations.
capacity:
  max_payload_size_bytes: 16384        # 16 KiB inline cap declared by SUT for create_long_task
  declared_concurrent_task_ceiling: null   # not declared; test pushes to first observed backpressure

# Auth declaration — values are sourced from env vars at run time. Real
# secrets MUST NOT appear in this file.
auth:
  scheme: bearer
  token_env_var: SPRING_AI_ASCEND_BEARER_TOKEN
  additional_headers:
    X-Tenant-Id:
      env_var: SPRING_AI_ASCEND_TENANT_ID
      required: true
  tenant_claim_present: true           # JWT carries a tenant_id claim that the SUT cross-checks against X-Tenant-Id
