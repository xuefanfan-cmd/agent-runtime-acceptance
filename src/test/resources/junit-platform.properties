# JUnit Platform — parallel execution master switch.
#
# Parallel execution is *enabled* here but the node and class defaults stay
# `same_thread`, so the overall test suite is unchanged unless a class explicitly
# opts in with @Execution(ExecutionMode.CONCURRENT). StreamingTravelPlanningTest
# does so to run its cases concurrently against the shared managed stack.
#
# The pool uses the `fixed` strategy. Two knobs matter and they are NOT the same:
#
#   fixed.parallelism=3     — the ForkJoinPool's *target* worker count.
#   fixed.max-pool-size=3   — the pool's HARD thread ceiling (maximumPoolSize).
#
# `parallelism` alone does NOT cap concurrent invocations: the fixed strategy's
# DEFAULT max-pool-size is `parallelism + 256` (here 259), and ForkJoinPool grows
# past `parallelism` whenever a worker blocks via a managed block. Our REST
# transports trigger that on every round — RestExchange.postSse/postJson call the
# JDK HttpClient.send(), which is sendAsync().get() under the hood, and that
# CompletableFuture.get() on a ForkJoinPool worker goes through managedBlock, so
# the pool compensates by spawning threads up to max-pool-size. With the 259
# default we observed 8-9 of the 12 invocations starting in the same second
# (≈3 A2A held by Awaitility Thread.sleep polling + ~6 REST oversubscribed).
# Capping max-pool-size to parallelism closes it: compensation cannot exceed 3
# threads, so at most 3 invocations are in flight and the rest queue for a slot.
#
# `fixed.saturate` MUST stay at its default (true). With max-pool-size pinned to
# parallelism all 3 workers can be blocked at once; saturate=true lets
# ForkJoinPool accept that — the blocked worker just waits for its HttpClient
# future, which completes on the HTTP client's own IO thread (no pool thread
# needed, hence no deadlock). Setting saturate=false there would instead raise
# RejectedExecutionException.
#
# Every concurrent invocation drives a real LLM round-trip through the shared
# stack (mainplan → trip → hotel), so this 3-slot cap protects the upstream LLM
# rate limit / quota — raising max-pool-size means more concurrent LLM calls.
# Only opt-in classes use the pool (everything else stays same_thread), so this
# does not serialise the rest of the suite. To tighten to 2, lower BOTH
# fixed.parallelism and fixed.max-pool-size (the latter must be >= the former).
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=same_thread
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=3
junit.jupiter.execution.parallel.config.fixed.max-pool-size=3
